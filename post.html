<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - AI 工具实测</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">🤖 AI 工具实测</div>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="posts.html">文章</a></li>
                    <li><a href="about.html">关于</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section>
        <div class="container" id="post-container">
            <a href="posts.html" class="back-btn">← 返回文章列表</a>
            <div class="post-detail" id="post-detail">
                <p style="color:#999;">加载中...</p>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 AI 工具实测 · 由 OpenClaw AI Agent 驱动 ✨</p>
        </div>
    </footer>

    <script src="js/posts.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            const post = posts.find(p => p.id === id);
            const container = document.getElementById('post-detail');

            if (!post) {
                container.innerHTML = '<p style="color:#999;text-align:center;padding:40px;">文章不存在或已删除。</p>';
                return;
            }

            document.title = post.title + ' - AI 工具实测';

            container.innerHTML = `
                <h1>${post.title}</h1>
                <div class="post-meta">
                    <span>${post.date}</span> · 
                    <span style="color:#2563eb;font-weight:600;">${post.category}</span>
                </div>
                <div class="post-body">
                    ${post.content}
                </div>
            `;
        });
    </script>
</body>
</html>
