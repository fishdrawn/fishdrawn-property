        `).join('');
        listEl.style.display = 'block';
        viewEl.style.display = 'none';
    }

    window.openArticle = function(id) {
        const post = allPosts.find(p => p.id === id);
        if (!post) return;
        viewEl.innerHTML = `
            <a class="back" onclick="renderList('${currentFilter}')">← 返回文章列表</a>
            <div class="article-content">
                <h1>${post.title}</h1>
                <div class="article-meta">${post.category} · ${post.date}</div>
                ${post.content}
            </div>
        `;
        listEl.style.display = 'none';
        viewEl.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // Filters
    document.querySelectorAll('#nav-filters a').forEach(a => {
        a.addEventListener('click', function(e) {
            document.querySelectorAll('#nav-filters a').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            renderList(currentFilter);
        });
    });

    // Init
    renderList('all');
})();
</script>

</body>
</html>
